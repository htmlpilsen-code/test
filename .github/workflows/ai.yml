name: AI generate code (Hugging Face)

on:
  repository_dispatch:
    types: [generate]

jobs:
  ai:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Call Hugging Face API (pipeline)
        run: |
          prompt="${{ github.event.client_payload.text }}"

          response=$(curl -s https://api-inference.huggingface.co/pipeline/text2text-generation/google/flan-t5-base \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"inputs\": \"Vytvoř jednoduchý PHP soubor (jen kód, bez vysvětlování). Zadání: $prompt\"
            }")

          echo "$response" > response.txt

      - name: Debug response
        run: |
          echo "===== RAW RESPONSE ====="
          cat response.txt

      - name: Parse AI output safely
        run: |
          python3 - << 'EOF'
          import json
          import os

          with open("response.txt") as f:
              raw = f.read()

          print("RAW RESPONSE:")
          print(raw)

          try:
              data = json.loads(raw)
          except Exception as e:
              print("❌ Not valid JSON from Hugging Face")
              exit(1)

          # HF pipeline sometimes returns list or dict
          if isinstance(data, list):
              text = data[0].get("generated_text", "")
          elif isinstance(data, dict) and "generated_text" in data:
              text = data["generated_text"]
          else:
              print("❌ Unexpected format:", data)
              exit(1)

          # extract PHP if model adds extra text
          if "<?php" in text:
              text = text[text.find("<?php"):]

          os.makedirs("web", exist_ok=True)

          with open("web/index.php", "w") as f:
              f.write(text)

          print("✅ PHP generated")
          EOF

      - name: Commit changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          git add web/index.php
          git commit -m "AI generated via Hugging Face" || echo "no changes"
          git push
