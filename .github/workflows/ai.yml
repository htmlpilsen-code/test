name: AI generate code (Hugging Face Router)

on:
  repository_dispatch:
    types: [generate]

jobs:
  ai:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Call Hugging Face Router API
        run: |
          prompt="${{ github.event.client_payload.text }}"

          response=$(curl -s https://router.huggingface.co/v1/chat/completions \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"mistralai/Mistral-7B-Instruct-v0.2\",
              \"messages\": [
                {
                  \"role\": \"user\",
                  \"content\": \"Vytvoř čistý PHP soubor (jen kód bez vysvětlování). Zadání: $prompt\"
                }
              ],
              \"stream\": false
            }")

          echo "$response" > response.json

      - name: Debug response
        run: |
          echo "===== RAW RESPONSE ====="
          cat response.json

      - name: Parse AI output safely
        run: |
          python3 - << 'EOF'
          import json, os

          with open("response.json") as f:
              raw = f.read()

          print("RAW:", raw)

          try:
              data = json.loads(raw)
          except Exception:
              print("❌ Invalid JSON response")
              exit(1)

          # Router API = OpenAI-like format
          try:
              text = data["choices"][0]["message"]["content"]
          except Exception:
              print("❌ Unexpected format:", data)
              exit(1)

          # extract PHP only if needed
          if "<?php" in text:
              text = text[text.find("<?php"):]

          os.makedirs("web", exist_ok=True)

          with open("web/index.php", "w") as f:
              f.write(text)

          print("✅ PHP generated")
          EOF

      - name: Commit changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          git add web/index.php
          git commit -m "AI generated via HF Router" || echo "no changes"
          git push
