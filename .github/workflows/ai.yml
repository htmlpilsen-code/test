name: AI generate code

on:
  repository_dispatch:
    types: [generate]

jobs:
  ai:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate PHP code with AI
        run: |
          prompt="${{ github.event.client_payload.text }}"

          response=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"user\",
                  \"content\": \"Vytvoř jednoduchý PHP soubor. Zadání: $prompt. Vrať pouze čistý PHP kód.\"
                }
              ]
            }")

          echo "$response" > response.json

      - name: Extract code to file
        run: |
          python3 - << 'EOF'
          import json

          data = json.load(open("response.json"))
          code = data["choices"][0]["message"]["content"]

          with open("web/index.php", "w") as f:
              f.write(code)
          EOF

      - name: Commit changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          git add web/index.php
          git commit -m "AI generated update" || echo "no changes"
          git push
