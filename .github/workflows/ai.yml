name: AI generate code (Hugging Face)

on:
  repository_dispatch:
    types: [generate]

jobs:
  ai:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Call Hugging Face API
        run: |
          prompt="${{ github.event.client_payload.text }}"

          response=$(curl -s https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"inputs\": \"Vytvoř čistý PHP soubor (jen kód bez vysvětlování). Zadání: $prompt\"
            }")

          echo "$response" > response.json

      - name: Debug response
        run: cat response.json

      - name: Extract generated code
        run: |
          python3 - << 'EOF'
          import json

          with open("response.json") as f:
              data = json.load(f)

          # Hugging Face vrací jiný formát než OpenAI
          if isinstance(data, list):
              text = data[0].get("generated_text", "")
          else:
              print("❌ Unexpected response:", data)
              exit(1)

          # někdy model vrací prompt + odpověď → ořízneme
          if "```" in text:
              text = text.split("```")[-1]

          import os
          os.makedirs("web", exist_ok=True)

          with open("web/index.php", "w") as f:
              f.write(text)

          print("✅ PHP generated")
          EOF

      - name: Commit changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          git add web/index.php
          git commit -m "AI generated via Hugging Face" || echo "no changes"
          git push
