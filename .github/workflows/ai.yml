name: AI generate code

on:
  repository_dispatch:
    types: [generate]

jobs:
  ai:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Call OpenAI API
        run: |
          prompt="${{ github.event.client_payload.text }}"

          response=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"user\",
                  \"content\": \"Vytvoř čistý PHP soubor (jen kód, bez vysvětlování). Zadání: $prompt\"
                }
              ]
            }")

          echo "$response" > response.json

      - name: Debug API response
        run: cat response.json

      - name: Generate PHP file safely
        run: |
          python3 - << 'EOF'
          import json

          with open("response.json") as f:
              data = json.load(f)

          if "choices" not in data:
              print("❌ OpenAI API error:")
              print(data)
              exit(1)

          code = data["choices"][0]["message"]["content"]

          # ensure folder exists
          import os
          os.makedirs("web", exist_ok=True)

          with open("web/index.php", "w") as f:
              f.write(code)

          print("✅ file generated")
          EOF

      - name: Commit changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          git add web/index.php
          git commit -m "AI generated update" || echo "no changes"
          git push
