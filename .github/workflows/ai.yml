name: AI generate code (Hugging Face)

on:
  repository_dispatch:
    types: [generate]

jobs:
  ai:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Call Hugging Face API
        run: |
          prompt="${{ github.event.client_payload.text }}"

          response=$(curl -s -w "\n%{http_code}" \
            https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"inputs\": \"Vytvoř čistý PHP soubor (jen kód, bez vysvětlování). Zadání: $prompt\"
            }")

          echo "$response" > response.txt

      - name: Debug raw response
        run: |
          echo "===== RAW RESPONSE ====="
          cat response.txt

      - name: Parse and generate file safely
        run: |
          python3 - << 'EOF'
          import os

          with open("response.txt") as f:
              raw = f.read()

          print("RAW:")
          print(raw)

          # split JSON + HTTP code
          parts = raw.rsplit("\n", 1)
          json_part = parts[0] if parts else raw

          try:
              import json
              data = json.loads(json_part)
          except Exception as e:
              print("❌ Invalid JSON from Hugging Face")
              exit(1)

          # HuggingFace returns list
          if isinstance(data, list) and "generated_text" in data[0]:
              text = data[0]["generated_text"]
          else:
              print("❌ Unexpected format:", data)
              exit(1)

          # extract only PHP if model adds extra text
          if "<?php" in text:
              text = text[text.find("<?php"):]

          os.makedirs("web", exist_ok=True)

          with open("web/index.php", "w") as f:
              f.write(text)

          print("✅ PHP file generated")
          EOF

      - name: Commit changes
        run: |
          git config user.name "ai-bot"
          git config user.email "ai-bot@users.noreply.github.com"

          git add web/index.php
          git commit -m "AI generated via Hugging Face" || echo "no changes"
          git push
