name: AI generate code (Hugging Face Router)

on:
  repository_dispatch:
    types: [generate]

permissions:
  contents: write
  actions: write

concurrency:
  group: ai
  cancel-in-progress: true

jobs:
  ai:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Call Hugging Face Router API
        run: |
          prompt="${{ github.event.client_payload.text }}"

          response=$(curl -s https://router.huggingface.co/v1/chat/completions \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"messages\": [
                {
                  \"role\": \"user\",
                  \"content\": \"Vytvoř čistý PHP soubor (jen kód bez vysvětlování). Zadání: $prompt\"
                }
              ],
              \"model\": \"deepseek-ai/DeepSeek-V4-Pro:novita\",
              \"stream\": false
            }")

          echo "$response" > response.json

      - name: Debug response
        run: cat response.json

      - name: Parse AI output safely
        run: |
          python3 - << 'EOF'
          import json, os

          with open("response.json") as f:
              data = json.load(f)

          text = data["choices"][0]["message"]["content"]

          if "<?php" in text:
              text = text[text.find("<?php"):]

          os.makedirs("web", exist_ok=True)

          with open("web/index.php", "w") as f:
              f.write(text)
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add web/index.php

          git commit -m "AI generated via HF Router" || echo "no changes"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

      - name: Trigger deploy workflow
        run: |
          curl -X POST https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref":"main"}'
